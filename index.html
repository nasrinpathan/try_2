<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Save to GitHub Demo</title>
</head>
<body>
  <h1>Save File to GitHub</h1>
  <textarea id="fileContent" rows="10" cols="50">Hello from the browser!</textarea><br>
  <input type="text" id="fileName" placeholder="Enter filename (e.g. test.txt)" />
  <button onclick="saveFile()">Save to GitHub</button>

  <pre id="output"></pre>

  <script>
    async function saveFile() {
      const repo = "nasrinpathan/try_2";
      const branch = "master"; // ✅ your repo default branch
      const token = "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"; // ⚠️ replace with your PAT
      const filename = document.getElementById("fileName").value;
      const content = document.getElementById("fileContent").value;

      if (!filename) {
        document.getElementById("output").textContent = "Please enter a filename.";
        return;
      }

      // Encode content to Base64
      const base64Content = btoa(unescape(encodeURIComponent(content)));

      // Check if file already exists (to get its SHA)
      let sha = null;
      const checkResponse = await fetch(
        `https://api.github.com/repos/${repo}/contents/${filename}?ref=${branch}`,
        { headers: { Authorization: `token ${token}` } }
      );
      if (checkResponse.status === 200) {
        const checkData = await checkResponse.json();
        sha = checkData.sha;
      }

      // Create or update the file
      const response = await fetch(
        `https://api.github.com/repos/${repo}/contents/${filename}`,
        {
          method: "PUT",
          headers: {
            Authorization: `token ${token}`,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            message: "Save file from browser",
            content: base64Content,
            branch: branch,
            sha: sha
          }),
        }
      );

      const result = await response.json();
      document.getElementById("output").textContent = JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
